name: Update Data & Deploy

on:
  schedule:
    # Run daily at 8 AM UTC (during NHL season)
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn requests

      - name: Generate data
        env:
          PUCKPEDIA_API_KEY: ${{ secrets.PUCKPEDIA_API_KEY }}
        run: python generate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/comps.json
          git diff --staged --quiet || git commit -m "Auto-update contract comps data $(date -u +'%Y-%m-%d')"
          git push
